<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main background gradient: top-left bright → bottom-right deep -->
    <linearGradient id="bg" x1="2" y1="2" x2="30" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#30d98c"/>
      <stop offset="100%" stop-color="#0b5e3a"/>
    </linearGradient>
    <!-- Subtle top shine for depth -->
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="white" stop-opacity="0.22"/>
      <stop offset="60%"  stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ── Speech bubble (body + tail as one path) ── -->
  <path
    d="M 7.5 2
       Q 2 2 2 7.5
       L 2 18.5
       Q 2 24 7.5 24
       L 5.5 24
       L 7 30
       L 10.5 24
       L 24.5 24
       Q 30 24 30 18.5
       L 30 7.5
       Q 30 2 24.5 2
       Z"
    fill="url(#bg)"
  />

  <!-- Top-shine overlay clipped to bubble shape -->
  <path
    d="M 7.5 2
       Q 2 2 2 7.5
       L 2 14
       L 30 14
       L 30 7.5
       Q 30 2 24.5 2
       Z"
    fill="url(#shine)"
  />

  <!-- ── Trend line ── -->
  <polyline
    points="7,20.5  12,14.5  17,17  24,9"
    stroke="white" stroke-width="2.6"
    stroke-linecap="round" stroke-linejoin="round"
    fill="none"
  />

  <!-- Arrow head -->
  <polyline
    points="20.5,8.5  24,9  23,13"
    stroke="white" stroke-width="2.6"
    stroke-linecap="round" stroke-linejoin="round"
    fill="none"
  />

  <!-- Data dots at each point for polish -->
  <circle cx="7"  cy="20.5" r="1.8" fill="white" opacity="0.7"/>
  <circle cx="12" cy="14.5" r="1.8" fill="white" opacity="0.85"/>
  <circle cx="17" cy="17"   r="1.8" fill="white" opacity="0.85"/>
  <circle cx="24" cy="9"    r="2.2" fill="white"/>
</svg>
